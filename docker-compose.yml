services:
  oracle:
    image: gvenzl/oracle-free:slim
    container_name: smart_pharmacy_oracle
    environment:
      ORACLE_PASSWORD: Oracle123
      APP_USER: smart_pharmacy
      APP_USER_PASSWORD: SmartPharmacy123
    ports:
      - "1522:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  app:
    build: .
    container_name: smart_pharmacy_app
    ports:
      - "3000:3000"
    depends_on:
      oracle:
        condition: service_healthy
    environment:
      DB_USER: smart_pharmacy
      DB_PASSWORD: SmartPharmacy123
      DB_CONNECTION: oracle:1521/FREEPDB1
      JWT_SECRET: smart-pharmacy-jwt-secret-change-in-production
      JWT_EXPIRES_IN: 7d
      NODE_ENV: production

volumes:
  oracle_data:
